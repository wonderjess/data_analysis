[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the backend on Render
[[redirects]]
  from = "/api/*"
  to = "https://data-analysis-7ggr.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
